name: jaspr_lints
description: A collection of lints and assists for jaspr projects.
version: 0.7.1
homepage: https://jaspr.site
repository: https://github.com/schultek/jaspr
issue_tracker: https://github.com/schultek/jaspr/issues
documentation: https://docs.jaspr.site/api/linting
funding:
  - https://github.com/sponsors/schultek

topics:
  - jaspr
  - web
  - lints

environment:
  sdk: ">=3.8.0 <4.0.0"

resolution: workspace

dependencies:
  analysis_server_plugin: ^0.3.0
  analyzer: ^12.1.0
  analyzer_plugin: any
  dart_data_home: ^0.1.0
  path: ^1.9.0
  yaml: ^3.1.2

dev_dependencies:
  analyzer_testing: ^0.2.5
  test: ^1.29.0
  test_reflective_loader: ^0.4.0
