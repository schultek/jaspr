name: jaspr_devtools
description: Jaspr DevTools standalone application
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.10.0 <4.0.0'

resolution: workspace

dependencies:
  jaspr: ^0.23.0
  jaspr_router: ^0.8.1
  sse: ^4.1.8
  universal_web: ^1.1.1+1
  vm_service: ^15.0.0
  web: ^1.1.0

dev_dependencies:
  build_runner: ^2.13.1
  build_web_compilers: ^4.4.16
  io: ^1.0.5
  jaspr_builder: ^0.23.0
  jaspr_cli: ^0.23.0

jaspr:
  mode: client

