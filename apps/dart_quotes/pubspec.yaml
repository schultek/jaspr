name: dart_quotes
description: A collection of Dart quotes. Built for FullStackFlutter Conference.
version: 0.1.8-dev.1
publish_to: none

environment:
  sdk: '>=3.6.0 <4.0.0'

resolution: workspace

dependencies:
  cloud_firestore: ^5.4.1
  dart_firebase_admin: ^0.4.1
  firebase_auth: ^5.2.1
  firebase_core: ^3.4.1
  jaspr: ^0.21.0-dev.0
  jaspr_router: ^0.7.1

dev_dependencies:
  build_runner: ^2.6.0
  jaspr_builder: ^0.21.0-dev.0
  jaspr_lints: #^0.4.0
    path: ../../packages/jaspr_lints
  jaspr_repo: any
  jaspr_web_compilers: ^4.2.0

jaspr:
  mode: server
