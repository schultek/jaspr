name: dart_quotes
description: A collection of Dart quotes. Built for FullStackFlutter Conference.
version: 0.1.12
publish_to: none

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  cloud_firestore: ^6.4.0
  dart_firebase_admin: ^0.4.1
  firebase_auth: ^6.5.0
  firebase_core: ^4.8.0
  jaspr: ^0.23.0
  jaspr_router: ^0.8.0

dev_dependencies:
  build_runner: ^2.6.0
  build_web_compilers: ^4.4.6
  jaspr_builder: ^0.23.0

jaspr:
  mode: server
  flutter: plugins
