name: jaspr_workspace
publish_to: none
repository: https://github.com/schultek/jaspr

environment:
  sdk: ">=3.8.0 <4.0.0"

workspace:
  - packages/jaspr
  - packages/jaspr_builder
  - packages/jaspr_cli
  - packages/jaspr_content
  - packages/jaspr_flutter_embed
  - packages/jaspr_lints
  - packages/jaspr_repo
  - packages/jaspr_riverpod
  - packages/jaspr_router
  - packages/jaspr_serverpod
  - packages/jaspr_test
  - apps/dart_quotes
  - apps/dart_quotes_server
  - apps/fluttercon
  - apps/website
  - examples/backend_dart_frog
  - examples/backend_serverpod/example_server
  - examples/backend_shelf
  - examples/flutter_embedding
  - examples/flutter_multi_view
  - examples/flutter_plugin_interop
  - examples/package_riverpod

dev_dependencies:
  melos: ^7.1.0

dependency_overrides:
  cli_util: 0.5.0 # Until melos upgrades to this version
  # !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
  # ATTENTION / SCREAMING COMMENT:
  # Why test_api is overridden to 0.7.12:
  # On Flutter stable CI runners (e.g., Flutter 3.44.5 / channel stable), the bundled
  # flutter_test package pins test_api to 0.7.11. Because test >=1.31.0 requires
  # test_api >=0.7.12, pub is forced to downgrade test to <1.31.0. However, those
  # older test versions conflict with our analyzer ^13.0.0 constraint!
  # We MUST override test_api to 0.7.12 here so CI can resolve analyzer ^13.0.0.
  # We may have to wait until the next Flutter stable roll before this can be removed.
  # !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
  test_api: 0.7.12

melos:
  command:
    bootstrap:
      hooks:
        post: |
          dart pub global activate packages/jaspr_cli --source=path

  ide:
    intellij:
      enabled: false

  scripts:
    format:
      steps:
        - melos exec --ignore=jaspr_cli -- "dart format . --set-exit-if-changed"
        - melos exec --scope=jaspr_cli -- "dart format lib --set-exit-if-changed"
    analyze: melos exec -- "dart analyze . --fatal-infos --no-use-aot-snapshot"
    test:
      run: dart test --exclude-tags=cli
      exec:
        concurrency: 1
      packageFilters:
        scope:
          [
            jaspr,
            jaspr_builder,
            jaspr_cli,
            jaspr_content,
            jaspr_lints,
            jaspr_riverpod,
            jaspr_router,
          ]
    coverage:
      run: |
        dart test --coverage=coverage --exclude-tags=cli-integration-test &&
        dart pub global run coverage:format_coverage --check-ignore --report-on=lib --lcov -o "$MELOS_ROOT_PATH/coverage/\$MELOS_PACKAGE_NAME_lcov.info" -i ./coverage
      exec:
        concurrency: 1
      packageFilters:
        scope:
          [
            jaspr,
            jaspr_builder,
            jaspr_cli,
            jaspr_content,
            jaspr_lints,
            jaspr_riverpod,
            jaspr_router,
          ]
    test:cli:integration:
      run: |
        cd packages/jaspr_cli &&
        dart test --tags="$VARIANT"
    coverage:all:
      run: |
        melos run coverage --no-select
        genhtml --ignore-errors unmapped -p $MELOS_ROOT_PATH/packages -o $MELOS_ROOT_PATH/coverage/report $MELOS_ROOT_PATH/coverage/*_lcov.info
        open $MELOS_ROOT_PATH/coverage/report/index.html
    generate:build:
      packageFilters:
        dependsOn: build_runner
      run: |
        melos exec --depends-on=build_runner -- "dart run build_runner build --delete-conflicting-outputs"
    generate:html:
      run: |
        cd packages/jaspr
        dart run tool/generate_html.dart
    generate:scaffold:
      run: |
        cd packages/jaspr_cli
        dart run tool/generate_scaffold.dart
    generate:versions:
      run: |
        cd packages/jaspr_cli
        dart run tool/generate_versions.dart
    activate:cli:
      run: |
        rm -r packages/jaspr_cli/.dart_tool
        dart pub global activate packages/jaspr_cli --source=path
    activate:cli:windows:
      run: |
        cd packages\jaspr_cli\
        del .dart_tool
        dart pub get
        dart pub global activate . --source=path
    deploy:jasprpad:
      run: |
        dart run apps/jaspr_pad/tool/deploy.dart
